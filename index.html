.btn-group { display: flex; gap: 10px; }

#clearFilterBtn { display: none; background: #fb7185; color: #0f172a; border: none; padding: 8px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
#clearFilterBtn:hover { background: #f43f5e; transform: scale(1.05); }
input { margin-top: 15px; padding: 12px; width: 100%; box-sizing: border-box; max-width: 650px; border-radius: 10px; border: none; outline: none; background: #1e293b; color: white; font-size: 15px; }
input::placeholder { color: #94a3b8; }
.container { padding: 10px; max-width: 650px; margin: 0 auto; }
.month { margin-top: 24px; font-weight: bold; font-size: 22px; border-bottom: 2px solid #334155; padding-bottom: 5px; }
.card { background: #1e293b; border-radius: 12px; padding: 16px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
.left-info { display: flex; flex-direction: column; gap: 6px; }
.date { font-size: 13px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
.player { font-size: 18px; font-weight: bold; }
.game-details { font-size: 13px; color: #cbd5e1; }
.points-container { text-align: right; }
.points { font-size: 26px; font-weight: 800; color: #475569; }

/* NEW COLOR GRADING FOR POINTS */
.points.white   { color: #ffffff; }
.points.blue    { color: #60a5fa; }
.points.green   { color: #4ade80; }
.points.yellow  { color: #facc15; }
.points.orange  { color: #fb923c; }
.points.red     { color: #f43f5e; }

.score { font-size: 12px; color: #94a3b8; margin-top: 4px; }

/* Modal (Leaderboard + Update) Styles */
.modal { display: none; position: fixed; z-index: 20; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
.modal-content { background-color: #0f172a; margin: 10% auto; padding: 24px; border: 1px solid #334155; width: 90%; max-width: 550px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
.modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e293b; padding-bottom: 12px; margin-bottom: 16px; }
.modal-header h2 { margin: 0; font-size: 22px; color: #facc15; }
.close { color: #94a3b8; font-size: 32px; font-weight: bold; cursor: pointer; line-height: 1; }
.close:hover { color: white; }
.leader-item { background: #1e293b; margin-bottom: 12px; border-radius: 10px; padding: 14px; }
.leader-top-row { display: flex; justify-content: space-between; align-items: center; }
.leader-name { font-size: 18px; font-weight: bold; }
.leader-actions { display: flex; align-items: center; gap: 10px; }
.leader-count { background: #334155; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: bold; color: #facc15; }
.show-dates-btn { background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
.show-dates-btn:hover { background: #2563eb; transform: scale(1.05); }
/* Update modal button styles */

#goToDateBtn { background: #3b82f6; color: white; border: none; }
#goToDateBtn:hover { background: #2563eb; transform: scale(1.03); }

const months = [
    ["January", 31], ["February", 29], ["March", 31], ["April", 30],
    ["May", 31], ["June", 30], ["July", 31], ["August", 31],
    ["September", 30], ["October", 31], ["November", 30], ["December", 31]
];
function build() {
    let container = document.getElementById("list");
    months.forEach(m => {
        let monthName = m[0]; let days = m[1];
        let monthDiv = document.createElement("div");
        monthDiv.innerHTML = `<div class='month'>${monthName}</div>`;
        container.appendChild(monthDiv);
        for (let d = 1; d <= days; d++) {
            let short = monthName.substring(0, 3) + " " + d;
            let rec = records[short];
            let card = document.createElement("div");
            card.className = "card";
            if (rec) {
                // ADD ID FOR MARCH 10 SO WE CAN SCROLL TO IT
                if (short === "Mar 10") card.id = "mar10";
             
                // NEW COLOR GRADING LOGIC
                let colorClass = "";
                const pts = rec.points;
                if (pts >= 70) colorClass = "red";
                else if (pts >= 60) colorClass = "orange";
                else if (pts >= 50) colorClass = "yellow";
                else if (pts >= 40) colorClass = "green";
                else if (pts >= 30) colorClass = "blue";
                else colorClass = "white";

                card.setAttribute("data-search", `${short} ${rec.player} ${rec.points} ${rec.year} ${rec.team} ${rec.opp}`.toLowerCase());
                card.innerHTML = `
                    <div class="left-info">
                        <div class="date">${short}, ${rec.year}</div>
                        <div class="player">${rec.player}</div>
                        <div class="game-details">${rec.team} vs. ${rec.opp}</div>
                    </div>
                    <div class="points-container">
                        <div class="points ${colorClass}">${rec.points} pts</div>
                        <div class="score">Final: ${rec.score}</div>
                    </div>`;
            } else {
                card.setAttribute("data-search", `${short} tbd`.toLowerCase());
                card.innerHTML = `
                    <div class="left-info">
                        <div class="date">${short}</div>
                        <div class="player">TBD</div>
                    </div>
                    <div class="points-container"><div class="points">—</div></div>`;
            }
            container.appendChild(card);
        }
    });
}

    let html = "";
    sortedLeaders.forEach((leader, index) => {
        const [player, count] = leader;
        html += `
            <div class="leader-item">
                <div class="leader-top-row">
                    <div class="leader-name">#${index + 1} ${player}</div>
                    <div class="leader-actions">
                        <span class="leader-count">${count} Dates</span>
                        <button class="show-dates-btn" onclick="filterByPlayer('${player}')">Show Dates</button>
                    </div>
                </div>
            </div>
        `;
    });
    document.getElementById("leaderboardList").innerHTML = html;
}
window.filterByPlayer = function(playerName) {
    document.getElementById("leaderboardModal").style.display = "none";
    const searchInput = document.getElementById("search");
    searchInput.value = playerName;
    searchInput.dispatchEvent(new Event('input'));
    document.getElementById("leaderboardBtn").style.display = "none";
    document.getElementById("clearFilterBtn").style.display = "block";
};
build();
// Search functionality
document.getElementById("search").addEventListener("input", e => {
    let q = e.target.value.toLowerCase().trim();
    document.querySelectorAll(".card").forEach(card => {
        card.style.display = card.getAttribute("data-search").includes(q) ? "flex" : "none";
    });
    if (q === "") {
        document.getElementById("leaderboardBtn").style.display = "block";
        document.getElementById("clearFilterBtn").style.display = "none";
    }
});
// Clear filter functionality
document.getElementById("clearFilterBtn").addEventListener("click", () => {
    const searchInput = document.getElementById("search");
    searchInput.value = "";
    searchInput.dispatchEvent(new Event('input'));
});
// Leaderboard Modal functionality
const modal = document.getElementById("leaderboardModal");
const btn = document.getElementById("leaderboardBtn");
const closeBtn = document.getElementsByClassName("close")[0];
btn.onclick = function() {
    buildLeaderboard();
    modal.style.display = "block";
}
closeBtn.onclick = function() {
    modal.style.display = "none";
}
// ==================== NEW UPDATE POPUP LOGIC ====================
const updateModal = document.getElementById("updateModal");
const updateClose = document.getElementById("updateClose");
const okayBtn = document.getElementById("okayBtn");
const goToDateBtn = document.getElementById("goToDateBtn");
function closeUpdateModal() {
    updateModal.style.display = "none";
}
updateClose.onclick = closeUpdateModal;
okayBtn.onclick = closeUpdateModal;
goToDateBtn.onclick = function() {
    closeUpdateModal();
    const targetCard = document.getElementById("mar10");
    if (targetCard) {
        targetCard.scrollIntoView({ behavior: "smooth", block: "center" });
    }
};
// Close update modal when clicking outside it
updateModal.addEventListener("click", function(event) {
    if (event.target === updateModal) {
        closeUpdateModal();
    }
});
// Show the popup automatically when the page opens
updateModal.style.display = "block";
// Extend the global window click handler to also close the update modal if needed
const oldWindowClick = window.onclick;
window.onclick = function(event) {
    if (oldWindowClick) oldWindowClick(event);
    if (event.target === updateModal) {
        closeUpdateModal();
    }
    if (event.target === modal) {
        modal.style.display = "none";
    }
}
</script>
